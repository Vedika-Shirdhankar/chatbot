<!DOCTYPE html>
<html>
<head>
    <title>InfraTrack AI</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        h2 {
            margin-top: 20px;
        }

        #chatbox {
            width: 60%;
            height: 400px;
            overflow-y: auto;
            border-radius: 12px;
            background: #1a1a1a;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #333;
            align-self: flex-end;
            text-align: right;
        }

        .ai {
            background: #222;
            color: #00ffcc;
            align-self: flex-start;
        }

        #input-area {
            margin-top: 15px;
        }

        input {
            width: 300px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #00ffcc;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }

        #loader {
            display: none;
            margin-top: 10px;
            color: #aaa;
        }
    </style>
</head>

<body>

<h2>🤖 InfraTrack AI Assistant</h2>

<div id="chatbox"></div>
<div style="margin-bottom: 10px;">
    <input type="file" id="pdfFile" accept="application/pdf" />
    <button onclick="uploadPDF()">Upload PDF</button>
</div>
<div id="input-area">
    <input id="input" placeholder="Ask something..." />
    <button onclick="sendMessage()">Send</button>
</div>

<div id="loader">AI is typing...</div>

<script>

async function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value.trim();

    if (!message) return;

    let chatbox = document.getElementById("chatbox");
    let loader = document.getElementById("loader");

    chatbox.innerHTML += `<div class="message user"><b>You:</b> ${message}</div>`;
    input.value = "";
    loader.style.display = "block";

    try {
        let response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({message: message})
        });

        let data = await response.json();

        loader.style.display = "none";

        chatbox.innerHTML += `<div class="message ai"><b>AI:</b> ${data.response}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;

    } catch (error) {
        loader.style.display = "none";
        chatbox.innerHTML += `<div style="color:red;">Error connecting to server</div>`;
    }
}


// ✅ KEEP THIS OUTSIDE
async function uploadPDF() {
    console.log("UPLOAD CLICKED");  // debug

    const fileInput = document.getElementById("pdfFile");
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a PDF file");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        alert(data.message);

    } catch (error) {
        console.error(error);
        alert("Upload failed");
    }
}


</script>
</body>
</html>
